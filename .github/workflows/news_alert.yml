name: 차량사고 뉴스 알림

on:
  schedule:
    - cron: '0 23,3,7,11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  news-alert:
    runs-on: ubuntu-latest
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 패키지 설치
        run: pip install -r requirements.txt
      
      - name: 뉴스 검색 및 알림
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
      
      - name: 전송 기록 저장
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sent_news.json || true
          git diff --staged --quiet || git commit -m "Update sent_news.json"
          git push || true
